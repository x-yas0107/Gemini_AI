<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CoreMem Analyzer Pro - Dashboard V1.00</title>
    <style>
        body { 
            font-family: 'Segoe UI', Consolas, monospace; 
            margin: 0; padding: 10px; 
            background-color: #0a0a0a; color: #e0e0e0; 
            height: 100vh; box-sizing: border-box; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        
        .header { 
            margin-bottom: 8px; font-size: 18px; font-weight: bold; 
            color: #00ffcc; text-shadow: 0 0 5px rgba(0,255,204,0.4);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #222; padding-bottom: 6px;
        }
        
        .main-layout { display: flex; flex: 1; gap: 10px; min-height: 0; }
        
        .left-sidebar { width: 300px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-right: 4px; } 
        .right-content { 
            flex: 1; background: #050505; padding: 10px; 
            border-radius: 6px; border: 1px solid #222;
            display: flex; flex-direction: column; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        .panel { background: #141414; padding: 10px; border-radius: 6px; border: 1px solid #2a2a2a; } 
        h3 { margin: 0 0 6px 0; font-size: 12px; border-bottom: 1px solid #00ffcc; padding-bottom: 3px; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px; }
        
        .scrollable-btn-group {
            display: flex; flex-direction: column; gap: 4px;
            max-height: 120px; 
            overflow-y: auto; padding-right: 4px;
        }
        .scrollable-btn-group::-webkit-scrollbar { width: 4px; }
        .scrollable-btn-group::-webkit-scrollbar-track { background: #141414; }
        .scrollable-btn-group::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        button { 
            padding: 6px; font-size: 11px; font-weight: bold; font-family: inherit;
            cursor: pointer; border: 1px solid #333; border-radius: 3px; 
            background-color: #1e1e1e; color: #ccc; transition: all 0.1s; 
        }
        button:hover:not(:disabled) { background-color: #333; border-color: #00ffcc; color: #00ffcc; }
        button:disabled { color: #444; background-color: #111; cursor: not-allowed; border-color: #1a1a1a; }
        
        .sys-btn-group { display: flex; gap: 4px; margin-bottom: 6px; }
        .sys-btn-group button { flex: 1; }
        #btnConnect { background-color: #00332a; border-color: #008a74; color:#00ffcc; }
        #btnConnect:hover:not(:disabled) { background-color: #004d40; }
        #btnDisconnect { border-color: #8a0000; color: #ff5252; background-color: #330000; }
        #btnReset { border-color: #b37700; color: #ffb300; background-color: #332200; }

        .compact-stepper {
            display: flex; justify-content: space-between; align-items: center;
            background: #0a0a0a; border: 1px solid #222; padding: 3px 6px; border-radius: 3px;
            margin-bottom: 3px; cursor: ns-resize; transition: border-color 0.1s, background 0.1s;
        }
        .compact-stepper:hover:not(.disabled) { border-color: #00ffcc; background: #111; }
        .compact-stepper.disabled { opacity: 0.3; pointer-events: none; }
        .compact-stepper .label { color: #aaa; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; }
        .compact-stepper .control { display: flex; align-items: center; gap: 6px; }
        .compact-stepper .val { color: #00ffcc; font-weight: bold; font-size: 12px; width: 60px; text-align: right; user-select: none; font-family: Consolas, monospace; }
        .compact-stepper .arrows { display: flex; flex-direction: column; gap: 1px; }
        .compact-stepper .arrows button { 
            background: none; border: none; color: #555; font-size: 8px; 
            cursor: pointer; padding: 0 3px; line-height: 1; height: 10px; width: 16px; background-color: #1a1a1a; border-radius: 2px;
        }
        .compact-stepper .arrows button:hover { color: #fff; background-color: #333; }

        .log-panel { display: flex; flex-direction: column; flex: 1; min-height: 100px; padding: 0; overflow: hidden; border: 1px solid #222; border-radius: 4px; }
        textarea#log { 
            flex: 1; width: 100%; background: #050505; color: #00ea00; 
            font-family: 'Consolas', monospace; font-size: 10px;
            padding: 6px; box-sizing: border-box; border: none; resize: none; outline: none; line-height: 1.2;
        }

        #legendArea {
            margin-bottom: 6px; font-size: 11px; font-weight: bold; 
            font-family: Consolas, monospace; background: #111; 
            padding: 4px 8px; border-radius: 3px; border: 1px solid #222;
        }
        .chart-container { flex: 1; position: relative; width: 100%; height: 100%; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .status-indicator { font-size: 11px; color: #aaa; }
        .status-indicator span { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div>⚡ CoreMem Analyzer Pro (V1.00)</div>
    <div class="status-indicator">
        Calib ADC: <span id="valCalibADCDisp" style="color: #ffaa00; margin-right: 15px;">2048</span>
        Link: <span id="connStatus" style="color: #ff3366;">OFFLINE</span>
    </div>
</div>

<div class="main-layout">
    <div class="left-sidebar">
        <div class="panel">
            <h3>1. System</h3>
            <div class="sys-btn-group">
                <button id="btnConnect">🔌 CONN</button>
                <button id="btnDisconnect" disabled>❌ DISC</button>
            </div>
            <button id="btnReset" style="width: 100%;">🔄 CLR STATE</button>
        </div>

        <div class="panel">
            <h3>2. Analyze</h3>
            <div class="scrollable-btn-group">
                <button class="cmd-btn" data-cmd="9" disabled style="color:#33ff99;">🟢 CHK [9]</button>
                <button class="cmd-btn" data-cmd="7" disabled style="color:#ff3366;">🔴 SET [7]</button>
                <button class="cmd-btn" data-cmd="8" disabled style="color:#3399ff;">🔵 RST [8]</button>
                <button class="cmd-btn" data-cmd="5" disabled>📊 Analyze [5]</button>
                <button class="cmd-btn" data-cmd="3" disabled>🛠 CALIB [3]</button>
                <button class="cmd-btn" data-cmd="6" disabled>🧪 Dummy [6]</button>
            </div>
        </div>

        <div class="panel">
            <h3>3. View Settings</h3>
            <div class="compact-stepper" id="stZoom" tabindex="0">
                <span class="label">X-Zoom</span>
                <div class="control">
                    <span class="val" id="valZoomDisp">1.0x</span>
                    <div class="arrows">
                        <button id="btnZoomUp">▲</button>
                        <button id="btnZoomDown">▼</button>
                    </div>
                </div>
            </div>
            <div class="compact-stepper" id="stScroll" tabindex="0">
                <span class="label">X-Scroll</span>
                <div class="control">
                    <span class="val" id="valScrollDisp">0</span>
                    <div class="arrows">
                        <button id="btnScrollUp">▲</button>
                        <button id="btnScrollDown">▼</button>
                    </div>
                </div>
            </div>
            <div class="compact-stepper" id="stTargetV" tabindex="0">
                <span class="label">Target V.GND</span>
                <div class="control">
                    <span class="val" id="valTargetVDisp">2.49 V</span>
                    <div class="arrows">
                        <button id="btnTargetVUp">▲</button>
                        <button id="btnTargetVDown">▼</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>4. Parameters</h3>
            <div class="compact-stepper disabled" id="stSet" tabindex="0">
                <span class="label">SET Width (s)</span>
                <div class="control">
                    <span class="val" id="valSetDisp">30 tks</span>
                    <div class="arrows">
                        <button id="btnSetUp">▲</button>
                        <button id="btnSetDown">▼</button>
                    </div>
                </div>
            </div>
            <div class="compact-stepper disabled" id="stRst" tabindex="0">
                <span class="label">RST Width (r)</span>
                <div class="control">
                    <span class="val" id="valRstDisp">30 tks</span>
                    <div class="arrows">
                        <button id="btnRstUp">▲</button>
                        <button id="btnRstDown">▼</button>
                    </div>
                </div>
            </div>
            <div class="compact-stepper disabled" id="stChk" tabindex="0">
                <span class="label">CHK Width (h)</span>
                <div class="control">
                    <span class="val" id="valChkDisp">2 tks</span>
                    <div class="arrows">
                        <button id="btnChkUp">▲</button>
                        <button id="btnChkDown">▼</button>
                    </div>
                </div>
            </div>
            <div class="compact-stepper disabled" id="stDelay" tabindex="0">
                <span class="label">Delay (d)</span>
                <div class="control">
                    <span class="val" id="valDelayDisp">20 us</span>
                    <div class="arrows">
                        <button id="btnDelayUp">▲</button>
                        <button id="btnDelayDown">▼</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="log-panel">
            <textarea id="log" readonly placeholder="Waiting..."></textarea>
        </div>
    </div>

    <div class="right-content">
        <div id="legendArea">
            <span style="color:#ff00ff; margin-right:15px;">■ PC4(Hold)</span>
            <span style="color:#FFD700; margin-right:15px;">■ TIM1(State)</span>
            <span style="color:#ffaa00; font-style: italic;">-- V.GND (Relative 0V REF)</span>
        </div>
        <div class="chart-container" id="chartWrapper">
            <canvas id="memChart"></canvas>
        </div>
    </div>
</div>

<script>
    /**
     * CoreMem Analyzer Pro Dashboard V1.00
     * Change History:
     * - V0.86: Strict baseline. Perfect sync parsing logic based on absolute index.
     * - V0.93: Fixed math logic. Graph scale strictly fixed to absolute 0.0V-5.0V. Target V.GND rendered dynamically.
     * - V0.95: 
     * 1. Implemented sendCommand queue to prevent serial port lock race conditions.
     * 2. Restored safe sync logic: Send all current parameters before dispatching an execution command.
     * 3. Restored X-Axis Logic: SAMPLES strictly fixed to 256. Graph index driven by absolute memory address [XXX] as in V0.86.
     * - V0.97: Removed forced button re-enable timeout for data dump commands to prevent serial buffer overflow.
     * - V1.00: Fixed absolute scale alignment. Y-axis layout anchors strictly on absolute Power GND (0V) to VDD (5.0V). Target V.GND step change modifies right-axis labels only and never shifts waveforms. Added Calib ADC raw value display header monitor.
     */
    let port; let reader; let keepReading = true; let readBuffer = ""; let isDumping = false;
    const SAMPLES = 256; let chartData = { s1: new Array(SAMPLES).fill(0), pls: new Array(SAMPLES).fill(0) };
    
    let calibOffset = 2048; 
    let targetRefV = 2.49; 

    const logEl = document.getElementById('log'); const connStatus = document.getElementById('connStatus');
    const btnConnect = document.getElementById('btnConnect'); const btnDisconnect = document.getElementById('btnDisconnect');
    const cmdButtons = document.querySelectorAll('.cmd-btn');
    const canvas = document.getElementById('memChart'); const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('chartWrapper');

    function appendLog(text) { logEl.value += text; logEl.scrollTop = logEl.scrollHeight; }

    let commandQueue = [];
    let isSending = false;

    async function sendCommand(cmd) {
        commandQueue.push(cmd);
        if (!isSending) flushQueue();
    }

    async function flushQueue() {
        if (!port || !port.writable || isSending) return;
        isSending = true;
        while(commandQueue.length > 0) {
            const cmd = commandQueue.shift();
            try {
                const writer = port.writable.getWriter();
                await writer.write(new TextEncoder().encode(cmd));
                writer.releaseLock();
            } catch(e) { 
                appendLog("SYS: TX Err\n"); 
            }
            await new Promise(r => setTimeout(r, 10));
        }
        isSending = false;
    }

    let zoomVal = 1.0; let scrollVal = 0; let maxScroll = 0;

    function updateScrollLimit() {
        maxScroll = Math.floor(255 - (255 / zoomVal));
        if (maxScroll < 0) maxScroll = 0;
        if (scrollVal > maxScroll) scrollVal = maxScroll;
        document.getElementById('valScrollDisp').innerText = scrollVal;
    }

    function setZoom(val) {
        if (val >= 1.0 && val <= 10.0) {
            zoomVal = val; document.getElementById('valZoomDisp').innerText = zoomVal.toFixed(1) + "x";
            updateScrollLimit(); drawGraph();
        }
    }
    document.getElementById('btnZoomUp').addEventListener('click', () => setZoom(zoomVal + 0.5));
    document.getElementById('btnZoomDown').addEventListener('click', () => setZoom(zoomVal - 0.5));
    document.getElementById('stZoom').addEventListener('wheel', (e) => {
        e.preventDefault(); e.deltaY < 0 ? setZoom(zoomVal + 0.5) : setZoom(zoomVal - 0.5);
    });

    function setScroll(val) {
        if (val >= 0 && val <= maxScroll) {
            scrollVal = val; document.getElementById('valScrollDisp').innerText = scrollVal;
            drawGraph();
        }
    }
    document.getElementById('btnScrollUp').addEventListener('click', () => setScroll(scrollVal + 5));
    document.getElementById('btnScrollDown').addEventListener('click', () => setScroll(scrollVal - 5));
    document.getElementById('stScroll').addEventListener('wheel', (e) => {
        e.preventDefault(); e.deltaY < 0 ? setScroll(scrollVal + 5) : setScroll(scrollVal - 5);
    });

    function updateTargetV(newVal) {
        if (newVal >= 0.0 && newVal <= 5.0) {
            targetRefV = Math.round(newVal * 100) / 100;
            document.getElementById('valTargetVDisp').innerText = targetRefV.toFixed(2) + " V";
            drawGraph();
        }
    }
    document.getElementById('btnTargetVUp').addEventListener('click', () => updateTargetV(targetRefV + 0.01));
    document.getElementById('btnTargetVDown').addEventListener('click', () => updateTargetV(targetRefV - 0.01));
    document.getElementById('stTargetV').addEventListener('wheel', (e) => {
        e.preventDefault(); e.deltaY < 0 ? updateTargetV(targetRefV + 0.01) : updateTargetV(targetRefV - 0.01);
    });

    function setupParamStepper(idPrefix, cmdPrefix, minVal, maxVal, step, initVal, unit) {
        let currentVal = initVal; const disp = document.getElementById('val' + idPrefix + 'Disp'); const stEl = document.getElementById('st' + idPrefix);
        const updateVal = (newVal) => {
            if (newVal >= minVal && newVal <= maxVal) {
                currentVal = newVal; disp.innerText = currentVal + " " + unit; sendCommand(cmdPrefix + currentVal + '\n');
            }
        };
        document.getElementById('btn' + idPrefix + 'Up').addEventListener('click', () => updateVal(currentVal + step));
        document.getElementById('btn' + idPrefix + 'Down').addEventListener('click', () => updateVal(currentVal - step));
        stEl.addEventListener('wheel', (e) => {
            if(stEl.classList.contains('disabled')) return;
            e.preventDefault(); e.deltaY < 0 ? updateVal(currentVal + step) : updateVal(currentVal - step);
        });
    }

    setupParamStepper('Set', 's', 5, 200, 1, 30, 'tks');
    setupParamStepper('Rst', 'r', 5, 200, 1, 30, 'tks');
    setupParamStepper('Chk', 'h', 1, 50, 1, 2, 'tks');
    setupParamStepper('Delay', 'd', 0, 100, 1, 20, 'us');

    btnConnect.addEventListener('click', async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            appendLog("SYS: Linked.\n");
            connStatus.innerText = "ONLINE"; connStatus.style.color = "#00ffcc";
            btnConnect.disabled = true; btnDisconnect.disabled = false;
            cmdButtons.forEach(btn => btn.disabled = false);
            document.querySelectorAll('.compact-stepper.disabled').forEach(el => el.classList.remove('disabled'));
            keepReading = true; startReading();
        } catch (err) { appendLog("SYS: Failed.\n"); }
    });

    btnDisconnect.addEventListener('click', async () => {
        keepReading = false; if (reader) await reader.cancel(); if (port) await port.close();
        appendLog("SYS: Closed.\n");
        connStatus.innerText = "OFFLINE"; connStatus.style.color = "#ff3366";
        btnConnect.disabled = false; btnDisconnect.disabled = true;
        cmdButtons.forEach(btn => btn.disabled = true);
        document.getElementById('stSet').classList.add('disabled');
        document.getElementById('stRst').classList.add('disabled');
        document.getElementById('stChk').classList.add('disabled');
        document.getElementById('stDelay').classList.add('disabled');
    });

    document.getElementById('btnReset').addEventListener('click', () => {
        isDumping = false; readBuffer = ""; appendLog("SYS: Reset.\n"); 
        chartData.s1.fill(0); chartData.pls.fill(0); drawGraph();
    });

    cmdButtons.forEach(btn => { 
        btn.addEventListener('click', async () => { 
            cmdButtons.forEach(b => b.disabled = true);
            const cmd = btn.getAttribute('data-cmd');
            
            const sVal = parseInt(document.getElementById('valSetDisp').innerText);
            const rVal = parseInt(document.getElementById('valRstDisp').innerText);
            const hVal = parseInt(document.getElementById('valChkDisp').innerText);
            const dVal = parseInt(document.getElementById('valDelayDisp').innerText);
            
            await sendCommand('s' + sVal + '\n');
            await sendCommand('r' + rVal + '\n');
            await sendCommand('h' + hVal + '\n');
            await sendCommand('d' + dVal + '\n');
            
            await sendCommand(cmd + '\n');

            if (['1', '3', '4'].includes(cmd)) {
                setTimeout(() => { cmdButtons.forEach(b => b.disabled = false); }, 2500); 
            }
        }); 
    });

    async function startReading() {
        while (port.readable && keepReading) {
            reader = port.readable.getReader();
            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (value) processIncomingData(new TextDecoder().decode(value));
                }
            } catch (error) { appendLog("SYS: Err\n"); } finally { reader.releaseLock(); }
        }
    }

    function processIncomingData(text) {
        readBuffer += text; let lines = readBuffer.split('\n'); readBuffer = lines.pop(); 
        let needsRedraw = false;
        
        for (let line of lines) {
            line = line.replace('\r', ''); 
            appendLog(line + '\n'); 

            let calibMatch = line.match(/Calib Offset:\s*(\d+)/i);
            if(calibMatch) {
                calibOffset = parseInt(calibMatch[1]);
                document.getElementById('valCalibADCDisp').innerText = calibOffset;
                let calibV = calibOffset * (5.0 / 4095.0);
                appendLog(`SYS: Calib Offset Auto-Sync -> ${calibOffset} (${calibV.toFixed(2)}V)\n`);
                needsRedraw = true;
            }

            if (line.includes("RAW DATA DUMP")) { 
                isDumping = true; 
                chartData.s1.fill(0); 
                chartData.pls.fill(0);
                continue; 
            }
            if (line.includes("DUMP END")) { 
                isDumping = false; 
                needsRedraw = true; 
                cmdButtons.forEach(btn => btn.disabled = false);
                continue; 
            }
            if (isDumping) {
                const match1 = line.match(/PLS:\s*(\d+),\s*\[\s*(\d+)\s*\]\s*S1:\s*(\d+)/i);
                const match2 = line.match(/\[\s*(\d+)\s*\]\s*S1:\s*(\d+),\s*PLS:\s*(\d+)/i);
                
                let idx = -1, s1 = 0, pls = 0;
                
                if (match1) {
                    pls = parseInt(match1[1]);
                    idx = parseInt(match1[2]);
                    s1 = parseInt(match1[3]);
                } else if (match2) {
                    idx = parseInt(match2[1]);
                    s1 = parseInt(match2[2]);
                    pls = parseInt(match2[3]);
                }

                if (idx >= 0 && idx < SAMPLES) { 
                    chartData.s1[idx] = s1; 
                    chartData.pls[idx] = pls; 
                }
            }
        }
        if (needsRedraw) drawGraph();
    }

    function drawGraph() {
        if (!canvas.width || !canvas.height) return;
        const H = canvas.height, W = canvas.width, mL = 60, mR = 40, mT = 15, mB = 25;
        const gW = W - mL - mR, gH = H - mT - mB;
        ctx.clearRect(0, 0, W, H);
        const toX = (idx) => mL + ((idx - scrollVal) / 255) * gW * zoomVal;

        ctx.lineWidth = 1; ctx.font = '12px Consolas'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.save(); ctx.beginPath(); ctx.rect(mL, mT, gW, gH + mB); ctx.clip();
        
        for(let i=0; i<=255; i++) {
            let x = toX(i);
            if (x >= mL - 20 && x <= mL + gW + 20) {
                ctx.strokeStyle = (i % 10 === 0) ? '#555' : (i % 5 === 0 ? '#333' : '#222');
                ctx.beginPath(); ctx.moveTo(x, mT); ctx.lineTo(x, mT + gH); ctx.stroke();
                ctx.fillStyle = (i % 10 === 0) ? '#ffffff' : '#aaaaaa';
                ctx.fillText(i, x, mT + gH + 4);
            }
        }
        ctx.restore();

        ctx.textBaseline = 'middle';
        
        for(let absV = 0.0; absV <= 5.0; absV += 0.5) {
            let y = mT + gH - (absV / 5.0) * gH;
            
            ctx.save();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(mL, y); ctx.lineTo(mL + gW, y); ctx.stroke();
            ctx.restore();
            
            let relV = absV - targetRefV;
            ctx.fillStyle = '#dddddd'; 
            ctx.textAlign = 'right';
            let sign = relV > 0.01 ? '+' : ''; 
            ctx.fillText(sign + relV.toFixed(2) + 'V', mL - 6, y);

            ctx.fillStyle = '#777777'; 
            ctx.textAlign = 'left';
            ctx.fillText(absV.toFixed(1) + 'V', mL + gW + 6, y);
        }

        let calibY = mT + gH - (calibOffset / 4095.0) * gH;
        if (calibY >= mT && calibY <= mT + gH) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 170, 0, 0.9)';
            ctx.lineWidth = 1.5; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(mL, calibY); ctx.lineTo(mL + gW, calibY); ctx.stroke();
            ctx.restore();
            
            ctx.fillStyle = '#ffaa00';
            ctx.textAlign = 'right';
            ctx.fillText('V.GND', mL - 6, calibY - 10);
        }

        ctx.save(); ctx.beginPath(); ctx.rect(mL, mT, gW, gH); ctx.clip();
        
        ctx.fillStyle = 'rgba(255, 215, 0, 0.1)'; ctx.beginPath(); ctx.moveTo(toX(0), mT + gH);
        for(let i=0; i<SAMPLES; i++) {
            let x = toX(i), y = chartData.pls[i] === 1 ? mT : mT + gH;
            if (i > 0) ctx.lineTo(x, chartData.pls[i-1] === 1 ? mT : mT + gH);
            ctx.lineTo(x, y);
        }
        ctx.lineTo(toX(SAMPLES-1), mT + gH); ctx.fill(); 

        ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)'; ctx.lineWidth = 1; ctx.beginPath();
        for(let i=0; i<SAMPLES; i++) {
            let x = toX(i), y = chartData.pls[i] === 1 ? mT : mT + gH;
            if (i === 0) ctx.moveTo(x, y);
            else { ctx.lineTo(x, chartData.pls[i-1] === 1 ? mT : mT + gH); ctx.lineTo(x, y); }
        }
        ctx.stroke();

        ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 1.5; ctx.beginPath();
        for(let i=0; i<SAMPLES; i++) {
            let raw = chartData.s1[i];
            let y = mT + gH - (raw / 4095.0) * gH; 
            y = Math.max(mT, Math.min(mT + gH, y));
            i === 0 ? ctx.moveTo(toX(i), y) : ctx.lineTo(toX(i), y);
        }
        ctx.stroke(); ctx.restore();
    }
    
    function resizeCanvas() { canvas.width = wrapper.clientWidth; canvas.height = wrapper.clientHeight; drawGraph(); }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);
</script>
</body>
